<div class="section" id="sec-processos" style="display:none">
  <div class="section-header">
    <span class="section-title">Processos minerários</span>
    <span class="section-sub">SCM + SIGMINE · num_processo como chave</span>
  </div>
  <div class="charts-row">
    <div class="card">
      <div class="card-head">
        <span class="card-title">Processos por UF</span>
        <span class="card-badge" style="color:var(--teal);border-color:var(--teal2)">SCM · SIGMINE</span>
      </div>
      <div class="bars" id="bar-uf"></div>
    </div>
    <div class="card">
      <div class="card-head">
        <span class="card-title">Tempo médio por fase (anos)</span>
        <span class="card-badge" style="color:var(--purple);border-color:var(--purple2)">SCM</span>
      </div>
      <div class="bars" id="bar-tempo"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-head">
      <span class="card-title">Processos — tabela detalhada</span>
      <span class="card-badge" style="color:var(--purple);border-color:var(--purple2)">SCM</span>
    </div>
    <table class="data-table">
      <thead><tr><th>Processo</th><th>Substância</th><th>UF</th><th>Municípios</th><th>Área (ha)</th><th>Fase</th><th>Titular</th></tr></thead>
      <tbody id="proc-tbody"></tbody>
    </table>
  </div>
</div>
