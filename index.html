<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel ANM — Atividade Mineral Brasileira</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;500;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="src/styles/main.css">
</head>

<div class="shell">

  <!-- ── TOPBAR ────────────────────────────────────── -->
  <header class="topbar">
    <div class="topbar-logo">
      <span class="dot"></span>
      ANM · Painel mineral
    </div>
    <div class="topbar-sep"></div>
    <span class="topbar-meta">SIGMINE + SCM + RAL + CFEM + SIGBM + TAH + DIPEM</span>
    <div class="topbar-badges">
      <span class="topbadge tb-green">Dados abertos</span>
      <span class="topbadge tb-amber">Brasil · 2010–2024</span>
      <span class="topbadge tb-blue">24 correlações</span>
    </div>
  </header>

  <!-- ── SIDEBAR ───────────────────────────────────── -->
  <aside class="sidebar">
    <div class="nav-group-label">Visões</div>
    <div class="nav-item active" data-section="overview">
      <span class="nav-icon" style="background:var(--green)"></span>
      Visão geral
    </div>
    <div class="nav-item" data-section="correlacoes">
      <span class="nav-icon" style="background:var(--purple)"></span>
      Correlações
    </div>
    <div class="nav-item" data-section="processos">
      <span class="nav-icon" style="background:var(--teal)"></span>
      Processos
    </div>
    <div class="nav-item" data-section="producao">
      <span class="nav-icon" style="background:var(--amber)"></span>
      Produção (RAL)
    </div>
    <div class="nav-item" data-section="arrecadacao">
      <span class="nav-icon" style="background:var(--coral)"></span>
      Arrecadação (CFEM)
    </div>
    <div class="nav-item" data-section="risco">
      <span class="nav-icon" style="background:var(--blue)"></span>
      Risco (SIGBM)
    </div>
    <div class="nav-item" data-section="fiscal">
      <span class="nav-icon" style="background:var(--pink)"></span>
      Fiscal (TAH)
    </div>
    <div class="nav-item" data-section="pesquisa">
      <span class="nav-icon" style="background:#d1d5db"></span>
      Pesquisa (DIPEM)
    </div>
    <div class="nav-item" data-section="comex">
      <span class="nav-icon" style="background:#1a4d8f"></span>
      Comércio exterior
    </div>

    <div class="nav-group-label" style="margin-top:8px">Filtros globais</div>

    <div class="filter-box">
      <label>Estado (UF)</label>
      <select id="uf-sel">
        <option value="">Todos</option>
        <option>MG</option><option>PA</option><option>MT</option>
        <option>GO</option><option>BA</option><option>AM</option>
        <option>SP</option><option>RS</option><option>RO</option>
      </select>
    </div>
    <div class="filter-box">
      <label>Substância</label>
      <select id="sub-sel">
        <option value="">Todas</option>
        <option>Ouro</option><option>Ferro</option><option>Cobre</option>
        <option>Calcário</option><option>Nióbio</option><option>Diamante</option>
        <option>Areia</option><option>Água mineral</option>
      </select>
    </div>
    <div class="filter-box">
      <label>Fase</label>
      <select id="fase-sel">
        <option value="">Todas</option>
        <option>Req. pesquisa</option>
        <option>Aut. pesquisa</option>
        <option>Concessão lavra</option>
        <option>Licenciamento</option>
        <option>Lavra garimpeira</option>
      </select>
    </div>
    <div class="filter-box">
      <label>Período</label>
      <select id="per-sel">
        <option>2010–2024</option>
        <option>2020–2024</option>
        <option>2015–2019</option>
        <option>2010–2014</option>
      </select>
    </div>
    <div class="filter-box">
      <label>Bioma</label>
      <select id="bioma-sel">
        <option value="">Todos</option>
        <option>Amazônia</option>
        <option>Cerrado</option>
        <option>Mata Atlântica</option>
        <option>Caatinga</option>
        <option>Pantanal</option>
        <option>Pampa</option>
      </select>
    </div>
    <div class="filter-box">
      <label>Regime</label>
      <select id="regime-sel">
        <option value="">Todos</option>
        <option>Concessão lavra</option>
        <option>Licenciamento</option>
        <option>Lavra garimpeira</option>
        <option>Autorização pesquisa</option>
        <option>Requerimento pesquisa</option>
      </select>
    </div>
  </aside>

  <!-- ── MAIN ──────────────────────────────────────── -->
  <main class="main" id="main-content"></main>
</div>

<script type="module" src="src/app.js"></script>
</body>
</html>
